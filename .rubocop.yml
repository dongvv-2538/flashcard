# Constitution Principle I: Code Quality — RuboCop configuration
plugins:
  - rubocop-rails
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  SuggestExtensions: false
  Exclude:
    - "db/schema.rb"
    - "db/migrate/**/*"
    - "bin/**/*"
    - "node_modules/**/*"
    - "vendor/**/*"
    - "config/environments/**/*"
    - "config/initializers/**/*"
    - "Gemfile"

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

# Documentation comments for boilerplate Rails base classes add no value.
Style/Documentation:
  Enabled: false

# Flash messages are kept inline; moving to locale files is a scalability
# concern that is out of scope for this single-language personal tool.
Rails/I18nLocaleTexts:
  Enabled: false

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/MethodLength:
  Max: 30
  Exclude:
    - "spec/**/*"

Metrics/AbcSize:
  Max: 30
  Exclude:
    - "spec/**/*"

Metrics/ClassLength:
  Max: 120
  Exclude:
    - "spec/**/*"

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "config/routes.rb"

Rails/FilePath:
  Enabled: false

RSpec/ExampleLength:
  Max: 20

RSpec/MultipleExpectations:
  Max: 5

RSpec/NestedGroups:
  Max: 4

# Implicit subject is the standard shoulda-matchers pattern (it { is_expected.to ... }).
RSpec/NamedSubject:
  Enabled: false

# Indexed helpers (card1, card2) are a well-understood convention in data-heavy specs.
RSpec/IndexedLet:
  Enabled: false

# let! for setup objects that create DB records (but aren't referenced by name
# in every example) is an accepted Rails testing convention.
RSpec/LetSetup:
  Enabled: false

# Test suites with many scenario-specific let helpers need higher limits.
RSpec/MultipleMemoizedHelpers:
  Max: 10
